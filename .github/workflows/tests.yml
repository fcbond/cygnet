name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install system dependencies
        run: sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Cache downloaded wordnet data
        uses: actions/cache@v4
        with:
          path: bin/
          key: wordnet-data-${{ hashFiles('build.sh') }}
          restore-keys: wordnet-data-

      - name: Download wordnet data
        run: bash build.sh --download-only

      - name: Build databases
        run: bash build.sh --build-only --skip-tests

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run tests
        run: uv run pytest tests/ -v
